# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e ".[dev]"
    - name: Lint with flake8 and format with black
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 src/magic/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 src/magic/ --count --exit-zero --max-complexity=30 --max-line-length=999 --statistics
        black --check --skip-string-normalization --line-length 127 .
    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=magic --cov-report=xml --cov-report=term
